name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master", "dev"]

env:
  DOCKER_REGISTRY: docker.io
  BACKEND_IMAGE: yusufkh/ctfbackend
  FRONTEND_IMAGE: yusufkh/ctffrontend

jobs:
  # Security scans - run first as they're critical for a security training platform
  security-scans:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect secrets with TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run OWASP Dependency Check (Backend)
        working-directory: ctf-backend
        run: |
          ./mvnw -B -ntp org.owasp:dependency-check-maven:check \
            -DfailOnError=false \
            -Dformat=ALL
        continue-on-error: true

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-report
          path: ctf-backend/target/dependency-check-report.html

  frontend:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ctf-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ctf-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (security check)
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --coverage

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ctf-frontend/coverage/

  backend:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ctf-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven

      - name: Run Checkstyle
        run: ./mvnw -B -ntp checkstyle:check

      - name: Run tests
        run: ./mvnw -B -ntp test

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ctf-backend/target/site/jacoco/

      - name: Build JAR
        run: ./mvnw -B -ntp package -DskipTests=true

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctf-backend-jar
          path: ctf-backend/target/*.jar

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ctfuser
          POSTGRES_PASSWORD: ctfpass
          POSTGRES_DB: ctf
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run backend integration tests
        working-directory: ctf-backend
        run: ./mvnw -B -ntp test -Dtest=*IntegrationTest
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ctf
          SPRING_DATASOURCE_USERNAME: ctfuser
          SPRING_DATASOURCE_PASSWORD: ctfpass

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [frontend, backend, integration-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./ctf-backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./ctf-frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner on backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend-results.sarif'

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [security-scans, frontend, backend, integration-tests, docker]
    if: failure()
    steps:
      - name: Notify failure
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'CI/CD pipeline failed! Check the logs for details.'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
